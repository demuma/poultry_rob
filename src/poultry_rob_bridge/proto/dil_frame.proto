syntax = "proto3";

package poultry_rob.dil;

// ---- Minimal header ----
message Header {
  uint64 seq = 1;              // laufende Nummer
  int64 stamp_unix_ms = 2;     // Timestamp (ms since epoch)
  string frame_id = 3;         // z.B. "farm"
}

// ---- Simple 2D point ----
message Point2D {
  float x = 1;
  float y = 2;
}

// ---- A detected object (hen, egg, whatever) ----
message Object {
  uint32 id = 1;
  string type = 2;             // "HEN", "EGG", "ROBOT"
  uint32 priority = 3;
  Point2D position = 4;
}

// ---- One complete snapshot ----
message Frame {
  Header header = 1;
  repeated Object objects = 2;
}
